<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSM Visualizer | Samarth Swami</title>
    <link rel="stylesheet" href="./styles.css">

</head>

<body>
    <!-- 🔷 NAVBAR -->
    <nav class="navigation">
        <div class="nav-brand">FSM Visualizer - Samarth Swami</div>
    </nav>

    <!-- 🔷 MAIN CARD -->
    <div class="container">

        <!-- 🔷 STATE DISPLAY -->
        <h3 id="stateDisplay" class="state-box">Current State: IDLE</h3>

        <!-- 🔷 ROOMS -->
        <h4 class="section-title">Rooms</h4>

        <div class="row">
            <div class="room-card">
                <img src="./images/off.gif" id="l2">
                <p><strong>L2</strong> Kitchen</p>
            </div>

            <div class="room-card">
                <img src="./images/off.gif" id="l3">
                <p><strong>L3</strong> Bedroom</p>
            </div>
        </div>

        <div class="row">
            <div class="room-card">
                <img src="./images/off.gif" id="l1">
                <p><strong>L1</strong> Entrance</p>
            </div>
        </div>

        <!-- 🔷 CONTROLS -->
        <h4 class="section-title">Controls</h4>

        <div class="row">
            <button onclick="onP1()" class="btn">P1</button>
            <button onclick="onP2()" class="btn">P2</button>
            <button onclick="resetFSM()" class="btn reset">RESET</button>
        </div>

        <h4 class="section-title">Transition Table</h4>

<table class="fsm-table">
  <tr>
    <th>Present</th>
    <th>P1 → State</th>
    <th>Output</th>
    <th>P2 → State</th>
    <th>Output</th>
  </tr>

  <tr>
    <td>IDLE</td>
    <td>ENTRANCE_ON</td>
    <td>01</td>
    <td>ENTRANCE_ON</td>
    <td>01</td>
  </tr>

  <tr>
    <td>ENTRANCE_ON</td>
    <td>KITCHEN_ON</td>
    <td>10</td>
    <td>BEDROOM_ON</td>
    <td>11</td>
  </tr>

  <tr>
    <td>KITCHEN_ON</td>
    <td>IDLE</td>
    <td>00</td>
    <td>IDLE</td>
    <td>00</td>
  </tr>

  <tr>
    <td>BEDROOM_ON</td>
    <td>IDLE</td>
    <td>00</td>
    <td>IDLE</td>
    <td>00</td>
  </tr>
</table>

    </div>

    <script src="./app.js"></script>
</body>
</html>
